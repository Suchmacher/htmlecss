<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeo em HTML5</title>
</head>
<body>
    <h1>Inserindo vídeos localmente</h1>
        <p>Este vídeo está no meu servidor local</p>
        <video width="560" poster="imagens/mar-capa.png" controls autoplay loop>
            <source src="midia/mar.mp4" type="video/mpeg">
            <source src="midia/mar.mov" type="video/mov">
            <source src="midia/mar.webm" type="video/webm">
            <p>Seu navegador não suporta o elemento de vídeo.</p>
        </video>

        <h1>Inserindo vídeos da web</h1>
        <p>Este vídeo está hospedado no YouTube</p>
        <iframe width="560" height="315" src="https://www.youtube.com/embed/sYb63xwx-Go?si=GoLPRH4wPS8s0j1u" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>


         
</body>
</html>
