<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cores em gradiente</title>
    <style> 
        * { /* configuração global para ocupar toda a tela */
            height: 100%;
        }
        body {
            background-image: linear-gradient(to top, #D92B8B, #BF2CA7, #723BBF, #F27329, #F25050);
            background-attachment: fixed; /* para o gradiente permanecer fixo durante a rolagem */
        }
    </style>
</head>
<body>
    <h1>Cores em gradiente</h1>


</body>
</html>
