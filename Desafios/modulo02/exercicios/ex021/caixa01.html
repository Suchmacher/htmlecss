<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixas</title>
    <style>
        h1 { /*box-level*/
            width: 300px;
            height: 300px;
            background-color: lightgray;

            border: 10 px solid darkslategrey;

            padding: 10px;

            margin: 20px auto 40px auto;

            outline: 5px dashed rgb(56, 209, 209);
        }

        a { /*inline-level*/
            border: 10px solid darkslategray;

            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Paragrafos também são exemplos de caixas box-level, mas os <a href="#">links são exemplos de caixas inline level</a>Vamos ver como isso tudo funciona.




</body>
</html>
