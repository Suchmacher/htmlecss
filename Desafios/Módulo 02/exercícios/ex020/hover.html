<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de hover</title>
    <style>
        body {
            font-family: Arial, Arial, Helvetica, sans-serif;
        }
        div > p {
            display: none;
        }
        div:hover > p {
            display: block;
            color: white;
            background-color: red
        }
        div:hover {
            color: violet;
        }
    </style>
</head>
<body>
    <h1>Exemplo de hover</h1>
    <p>Pass o mouse sobre o quadrado para ver o efeito:</p>
    <div>
        Passe o mouse aqui
        <p>TEXTO ESCONDIDO</p>
    </div>
    <p>
        Fim do exemplo.
    </p>



</body>
</html>
